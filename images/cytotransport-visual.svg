<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" style="background:#fff">
  <!-- Protein ion channel schematic -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6aad6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6aad6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Membrane lipid bilayer -->
  <rect x="60" y="120" width="280" height="18" rx="3" fill="#c2ddc5" opacity="0.7"/>
  <rect x="60" y="162" width="280" height="18" rx="3" fill="#c2ddc5" opacity="0.7"/>

  <!-- Lipid tails (top layer) -->
  <g stroke="#6aad6a" stroke-width="1.5" opacity="0.5">
    <line x1="80" y1="120" x2="80" y2="95"/>
    <line x1="80" y1="120" x2="75" y2="95"/>
    <line x1="100" y1="120" x2="100" y2="95"/>
    <line x1="100" y1="120" x2="95" y2="95"/>
    <line x1="120" y1="120" x2="120" y2="95"/>
    <line x1="120" y1="120" x2="115" y2="95"/>
    <line x1="140" y1="120" x2="140" y2="95"/>
    <line x1="140" y1="120" x2="135" y2="95"/>
    <line x1="260" y1="120" x2="260" y2="95"/>
    <line x1="260" y1="120" x2="255" y2="95"/>
    <line x1="280" y1="120" x2="280" y2="95"/>
    <line x1="280" y1="120" x2="275" y2="95"/>
    <line x1="300" y1="120" x2="300" y2="95"/>
    <line x1="300" y1="120" x2="295" y2="95"/>
    <line x1="320" y1="120" x2="320" y2="95"/>
    <line x1="320" y1="120" x2="315" y2="95"/>
  </g>

  <!-- Lipid tails (bottom layer) -->
  <g stroke="#6aad6a" stroke-width="1.5" opacity="0.5">
    <line x1="80" y1="180" x2="80" y2="205"/>
    <line x1="80" y1="180" x2="75" y2="205"/>
    <line x1="100" y1="180" x2="100" y2="205"/>
    <line x1="100" y1="180" x2="95" y2="205"/>
    <line x1="120" y1="180" x2="120" y2="205"/>
    <line x1="120" y1="180" x2="115" y2="205"/>
    <line x1="140" y1="180" x2="140" y2="205"/>
    <line x1="140" y1="180" x2="135" y2="205"/>
    <line x1="260" y1="180" x2="260" y2="205"/>
    <line x1="260" y1="180" x2="255" y2="205"/>
    <line x1="280" y1="180" x2="280" y2="205"/>
    <line x1="280" y1="180" x2="275" y2="205"/>
    <line x1="300" y1="180" x2="300" y2="205"/>
    <line x1="300" y1="180" x2="295" y2="205"/>
    <line x1="320" y1="180" x2="320" y2="205"/>
    <line x1="320" y1="180" x2="315" y2="205"/>
  </g>

  <!-- Channel protein (alpha-helices as cylinders) -->
  <!-- Left helix -->
  <ellipse cx="168" cy="118" rx="12" ry="6" fill="#3a7d44" opacity="0.8"/>
  <rect x="156" y="118" width="24" height="64" rx="2" fill="#3a7d44" opacity="0.7"/>
  <ellipse cx="168" cy="182" rx="12" ry="6" fill="#2d6337" opacity="0.8"/>

  <!-- Right helix -->
  <ellipse cx="232" cy="118" rx="12" ry="6" fill="#3a7d44" opacity="0.8"/>
  <rect x="220" y="118" width="24" height="64" rx="2" fill="#3a7d44" opacity="0.7"/>
  <ellipse cx="232" cy="182" rx="12" ry="6" fill="#2d6337" opacity="0.8"/>

  <!-- Channel pore -->
  <rect x="180" y="112" width="40" height="76" rx="4" fill="white"/>
  <ellipse cx="200" cy="112" rx="20" ry="8" fill="#e8f3e9"/>
  <ellipse cx="200" cy="188" rx="20" ry="8" fill="#e8f3e9"/>

  <!-- Ion flow arrows -->
  <g fill="#f4a261" opacity="0.9">
    <polygon points="200,72 195,88 205,88"/>
    <rect x="198" y="88" width="4" height="20" rx="2"/>
    <polygon points="200,228 195,212 205,212"/>
    <rect x="198" y="192" width="4" height="20" rx="2"/>
  </g>

  <!-- Ion labels -->
  <text x="200" y="68" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#f4a261" font-weight="bold">Na⁺</text>
  <text x="200" y="244" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#f4a261" font-weight="bold">K⁺</text>

  <!-- Label -->
  <text x="200" y="270" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#888">Ion channel — schematic</text>
</svg>
